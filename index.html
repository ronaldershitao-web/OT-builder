<!DOCTYPE html>
<html>
<head>
  <title>Smart School Workflow Builder</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      display:flex;
      height:100vh;
      background:#0f172a;
      color:white;
    }

    #left{
      width:280px;
      background:#111827;
      padding:10px;
      overflow:auto;
    }

    #center{
      flex:1;
      background:#0b1220;
      padding:10px;
      overflow:auto;
    }

    #right{
      width:300px;
      background:#111827;
      padding:10px;
    }

    .btn{
      background:#1f2937;
      padding:8px;
      margin:5px 0;
      cursor:pointer;
      border-radius:6px;
      text-align:center;
    }

    .step{
      background:#1f2937;
      padding:10px;
      margin:6px 0;
      border-radius:6px;
      cursor:pointer;
    }

    .flowBox{
      background:#0f172a;
      border:1px solid #334155;
      padding:10px;
      margin:5px;
      border-radius:6px;
    }

    .arrow{
      text-align:center;
      font-size:18px;
      opacity:0.7;
    }

    button{
      width:100%;
      padding:8px;
      margin-top:8px;
    }
  </style>
</head>

<body>

<!-- LEFT: COMPONENT LIBRARY -->
<div id="left">
  <h3>🏗️ System Blocks</h3>

  <div class="btn" onclick="addStep('User Login')">User Login</div>
  <div class="btn" onclick="addStep('Authentication Service')">Auth Service</div>
  <div class="btn" onclick="addStep('API Gateway')">API Gateway</div>
  <div class="btn" onclick="addStep('Validation Engine')">Validation</div>
  <div class="btn" onclick="addStep('Database Write')">Database Write</div>
  <div class="btn" onclick="addStep('Notification Service')">Notification</div>
  <div class="btn" onclick="addStep('External System')">External System</div>

  <hr>

  <button onclick="clearFlow()">Reset Flow</button>
</div>

<!-- CENTER: FLOW BUILDER -->
<div id="center">
  <h3>🔄 Build System Workflow</h3>
  <p style="opacity:0.7">Click blocks → build real system execution order</p>

  <div id="flow"></div>
</div>

<!-- RIGHT: ANALYSIS -->
<div id="right">
  <h3>🧠 System Analysis</h3>

  <button onclick="analyze()">Analyze Flow</button>

  <div id="out"></div>
</div>

<script>

let flow = [];

function addStep(name){
  flow.push(name);
  render();
}

function render(){

  let html = "";

  flow.forEach((f,i)=>{

    html += `
      <div class="flowBox">${f}</div>
    `;

    if(i < flow.length - 1){
      html += `<div class="arrow">↓</div>`;
    }

  });

  document.getElementById("flow").innerHTML = html;
}

function clearFlow(){
  flow = [];
  render();
}

function analyze(){

  let out = "";
  let score = 0;

  // must have start logic
  if(flow.includes("User Login")){
    out += "<p>✔ Entry point exists</p>";
    score++;
  } else {
    out += "<p>✖ Missing user entry flow</p>";
  }

  // must have API logic
  if(flow.includes("API Gateway")){
    out += "<p>✔ API layer exists</p>";
    score++;
  } else {
    out += "<p>⚠ Missing API Gateway</p>";
  }

  // must have data persistence
  if(flow.includes("Database Write")){
    out += "<p>✔ Data persistence exists</p>";
    score++;
  } else {
    out += "<p>⚠ No system storage layer</p>";
  }

  // must have service separation
  if(flow.includes("Authentication Service") || flow.includes("Validation Engine")){
    out += "<p>✔ Business logic separation exists</p>";
    score++;
  } else {
    out += "<p>⚠ No service layer logic</p>";
  }

  // realism check (order logic)
  if(flow[0] === "User Login"){
    out += "<p>✔ Correct system entry order</p>";
    score++;
  } else {
    out += "<p>⚠ System does not start correctly</p>";
  }

  out += "<hr>";

  if(score >= 4){
    out += "<p>🏆 Strong system design workflow</p>";
  } else {
    out += "<p>⚠ System flow needs refinement</p>";
  }

  document.getElementById("out").innerHTML = out;
}

</script>

</body>
</html>
