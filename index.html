<!DOCTYPE html>
<html>
<head>
  <title>System Flow Builder</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      display:flex;
      height:100vh;
      background:#0f172a;
      color:white;
    }

    #left{
      width:260px;
      background:#111827;
      padding:10px;
    }

    #canvas{
      flex:1;
      position:relative;
      background:#0b1220;
      overflow:hidden;
    }

    #right{
      width:260px;
      background:#111827;
      padding:10px;
    }

    .item{
      padding:6px;
      margin:5px;
      background:#1f2937;
      border-radius:6px;
      cursor:pointer;
      font-size:12px;
    }

    .node{
      position:absolute;
      padding:8px;
      border-radius:6px;
      font-size:11px;
      cursor:pointer;
      min-width:90px;
      text-align:center;
    }

    .start{ background:#22c55e; }
    .api{ background:#3b82f6; }
    .compute{ background:#8b5cf6; }
    .data{ background:#16a34a; }
    .infra{ background:#f59e0b; }
    .security{ background:#ef4444; }

    svg{
      position:absolute;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .hint{
      font-size:12px;
      opacity:0.7;
    }

    button{
      padding:6px;
      margin-top:5px;
    }
  </style>
</head>

<body>

<!-- LEFT TOOLBOX -->
<div id="left">
  <h3>System Builder</h3>

  <div class="hint">Step 1: Add START</div>
  <div class="item" onclick="add('START','start')">START (User Request)</div>

  <hr>

  <div class="hint">Flow Components</div>

  <div class="item" onclick="add('API_GATEWAY','api')">API Gateway</div>
  <div class="item" onclick="add('AUTH','security')">Auth Service</div>
  <div class="item" onclick="add('LOAD_BALANCER','infra')">Load Balancer</div>

  <div class="item" onclick="add('MICROSERVICE','compute')">Microservice</div>
  <div class="item" onclick="add('QUEUE','compute')">Queue (Kafka)</div>

  <div class="item" onclick="add('CACHE','data')">Cache (Redis)</div>
  <div class="item" onclick="add('DB','data')">Database</div>

  <div class="item" onclick="add('END','start')">END (Response)</div>

  <hr>

  <button onclick="validateFlow()">Validate System</button>

</div>

<!-- CANVAS -->
<div id="canvas">
  <svg id="lines"></svg>
</div>

<!-- RIGHT -->
<div id="right">
  <h3>System Logic</h3>
  <div id="out"></div>
</div>

<script>

let nodes = [];
let edges = [];
let selected = null;

function add(type, cls){

  nodes.push({
    id: Date.now()+Math.random(),
    type,
    cls,
    x: 100 + Math.random()*300,
    y: 100 + Math.random()*300
  });

  render();
}

function render(){

  document.querySelectorAll(".node").forEach(n=>n.remove());
  draw();

  nodes.forEach(n=>{
    const div = document.createElement("div");
    div.className = "node " + n.cls;
    div.style.left = n.x + "px";
    div.style.top = n.y + "px";
    div.innerText = n.type;

    div.onclick = (e)=>{
      e.stopPropagation();

      if(!selected){
        selected = n;
      } else {
        edges.push({from:selected.id,to:n.id});
        selected = null;
        render();
      }
    };

    div.onmousedown = (e)=>{
      drag(n,e);
    };

    document.getElementById("canvas").appendChild(div);
  });
}

function drag(node,e){

  let dx = e.clientX - node.x;
  let dy = e.clientY - node.y;

  function move(ev){
    node.x = ev.clientX - dx;
    node.y = ev.clientY - dy;
    render();
  }

  function up(){
    document.removeEventListener("mousemove",move);
    document.removeEventListener("mouseup",up);
  }

  document.addEventListener("mousemove",move);
  document.addEventListener("mouseup",up);
}

function draw(){

  const svg = document.getElementById("lines");
  svg.innerHTML = "";

  edges.forEach(e=>{

    const a = nodes.find(n=>n.id===e.from);
    const b = nodes.find(n=>n.id===e.to);

    if(!a||!b) return;

    const line = document.createElementNS("http://www.w3.org/2000/svg","line");

    line.setAttribute("x1",a.x+50);
    line.setAttribute("y1",a.y+20);
    line.setAttribute("x2",b.x+50);
    line.setAttribute("y2",b.y+20);
    line.setAttribute("stroke","white");

    svg.appendChild(line);
  });
}

/* ---------------------------
   FLOW VALIDATION ENGINE
----------------------------*/

function validateFlow(){

  let errors = [];

  const start = nodes.find(n=>n.type==="START");
  const end = nodes.find(n=>n.type==="END");

  if(!start) errors.push("Missing START node");
  if(!end) errors.push("Missing END node");

  // basic rule checks
  let hasAPI = nodes.some(n=>n.type==="API_GATEWAY");
  let hasDB = nodes.some(n=>n.type==="DB");

  if(!hasAPI) errors.push("No API Gateway (entry layer missing)");
  if(!hasDB) errors.push("No Database (data layer missing)");

  // check if system is too small
  if(nodes.length < 4) errors.push("System too small to be realistic");

  let html = "<h4>Validation Result</h4>";

  if(errors.length === 0){
    html += "<p>✔ Valid system flow</p>";
    html += "<p>System is architecturally complete</p>";
  } else {
    errors.forEach(e=>{
      html += "<p>⚠ " + e + "</p>";
    });
  }

  document.getElementById("out").innerHTML = html;
}

</script>

</body>
</html>
