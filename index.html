<!DOCTYPE html>
<html>
<head>
  <title>System Design Flow Builder (Arrows)</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      display:flex;
      height:100vh;
      background:#0f172a;
      color:white;
    }

    #left{
      width:240px;
      background:#111827;
      padding:10px;
    }

    #canvas{
      flex:1;
      position:relative;
      background:#0b1220;
      overflow:hidden;
    }

    #right{
      width:240px;
      background:#111827;
      padding:10px;
    }

    .item{
      padding:6px;
      margin:5px;
      background:#1f2937;
      border-radius:6px;
      cursor:pointer;
      font-size:12px;
    }

    .node{
      position:absolute;
      padding:8px;
      border-radius:6px;
      font-size:11px;
      min-width:90px;
      text-align:center;
      cursor:pointer;
      user-select:none;
    }

    .api{ background:#3b82f6; }
    .data{ background:#16a34a; }
    .infra{ background:#f59e0b; }
    .security{ background:#ef4444; }
    .compute{ background:#8b5cf6; }
    .start{ background:#22c55e; }

    svg{
      position:absolute;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .selected{
      outline:2px solid white;
    }

    button{
      padding:6px;
      margin-top:5px;
    }
  </style>
</head>

<body>

<!-- LEFT -->
<div id="left">
  <h3>Tools</h3>

  <div class="item" onclick="add('START','start')">Start (User)</div>
  <div class="item" onclick="add('API','api')">API Gateway</div>
  <div class="item" onclick="add('AUTH','security')">Auth</div>
  <div class="item" onclick="add('SERVICE','compute')">Service</div>
  <div class="item" onclick="add('QUEUE','compute')">Queue</div>
  <div class="item" onclick="add('CACHE','data')">Cache</div>
  <div class="item" onclick="add('DB','data')">Database</div>
  <div class="item" onclick="add('END','start')">End</div>

  <hr>

  <button onclick="clearAll()">Clear</button>

  <p style="font-size:11px;opacity:0.7">
    Click a node → then click another node to connect
  </p>
</div>

<!-- CANVAS -->
<div id="canvas">
  <svg id="svg"></svg>
</div>

<!-- RIGHT -->
<div id="right">
  <h3>Flow Analysis</h3>
  <button onclick="analyze()">Analyze</button>
  <div id="out"></div>
</div>

<script>

let nodes = [];
let edges = [];
let selected = null;

function add(type, cls){

  nodes.push({
    id: Date.now()+Math.random(),
    type,
    cls,
    x: 100 + Math.random()*300,
    y: 100 + Math.random()*300
  });

  render();
}

function render(){

  document.querySelectorAll(".node").forEach(n=>n.remove());
  drawEdges();

  nodes.forEach(n=>{
    const div = document.createElement("div");
    div.className = "node " + n.cls;
    div.style.left = n.x + "px";
    div.style.top = n.y + "px";
    div.innerText = n.type;

    if(selected && selected.id === n.id){
      div.classList.add("selected");
    }

    div.onclick = (e)=>{
      e.stopPropagation();

      if(!selected){
        selected = n;
      } else {
        if(selected.id !== n.id){
          edges.push({from:selected.id,to:n.id});
        }
        selected = null;
      }

      render();
    };

    div.onmousedown = (e)=>{
      drag(n,e);
    };

    document.getElementById("canvas").appendChild(div);
  });
}

function drag(node,e){

  let dx = e.clientX - node.x;
  let dy = e.clientY - node.y;

  function move(ev){
    node.x = ev.clientX - dx;
    node.y = ev.clientY - dy;
    render();
  }

  function up(){
    document.removeEventListener("mousemove",move);
    document.removeEventListener("mouseup",up);
  }

  document.addEventListener("mousemove",move);
  document.addEventListener("mouseup",up);
}

/* -------------------------
   DRAW ARROWS (REAL FLOW)
--------------------------*/

function drawEdges(){

  const svg = document.getElementById("svg");
  svg.innerHTML = "";

  edges.forEach(e=>{

    const a = nodes.find(n=>n.id===e.from);
    const b = nodes.find(n=>n.id===e.to);

    if(!a || !b) return;

    const line = document.createElementNS("http://www.w3.org/2000/svg","line");

    line.setAttribute("x1", a.x + 45);
    line.setAttribute("y1", a.y + 20);
    line.setAttribute("x2", b.x + 45);
    line.setAttribute("y2", b.y + 20);

    line.setAttribute("stroke", "white");
    line.setAttribute("stroke-width", "2");

    svg.appendChild(line);

    // arrow head (simple triangle)
    const arrow = document.createElementNS("http://www.w3.org/2000/svg","polygon");

    const angle = Math.atan2(b.y - a.y, b.x - a.x);

    const size = 8;
    const x = b.x + 45;
    const y = b.y + 20;

    const points = [
      [x, y],
      [x - size*Math.cos(angle - Math.PI/6), y - size*Math.sin(angle - Math.PI/6)],
      [x - size*Math.cos(angle + Math.PI/6), y - size*Math.sin(angle + Math.PI/6)]
    ].map(p=>p.join(",")).join(" ");

    arrow.setAttribute("points", points);
    arrow.setAttribute("fill","white");

    svg.appendChild(arrow);
  });
}

/* -------------------------
   ANALYSIS (REAL THINKING)
--------------------------*/

function analyze(){

  let hasStart = nodes.some(n=>n.type==="START");
  let hasAPI = nodes.some(n=>n.type==="API");
  let hasDB = nodes.some(n=>n.type==="DB");
  let hasService = nodes.some(n=>n.type==="SERVICE");

  let orphanNodes = nodes.filter(n=>
    !edges.some(e=>e.from===n.id || e.to===n.id)
  );

  let html = "<h4>System Review</h4>";

  if(!hasStart) html += "<p>⚠ Missing entry point</p>";
  if(!hasAPI) html += "<p>⚠ No API Gateway</p>";
  if(!hasService) html += "<p>⚠ No service layer</p>";
  if(!hasDB) html += "<p>⚠ No database layer</p>";

  if(orphanNodes.length > 0){
    html += "<p>⚠ Unconnected components: "+orphanNodes.length+"</p>";
  } else {
    html += "<p>✔ All components connected</p>";
  }

  if(edges.length >= 3){
    html += "<p>✔ System has flow structure</p>";
  } else {
    html += "<p>⚠ System flow too simple</p>";
  }

  document.getElementById("out").innerHTML = html;
}

function clearAll(){
  nodes = [];
  edges = [];
  selected = null;
  render();
}

</script>

</body>
</html>
