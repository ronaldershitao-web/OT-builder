<!DOCTYPE html>
<html>
<head>
  <title>OT Builder - Full Single File</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      display:flex;
      height:100vh;
    }

    /* AUTH */
    #auth{
      width:100%;
      padding:20px;
    }

    input, button, select{
      padding:8px;
      margin:5px;
    }

    /* APP LAYOUT */
    #app{
      display:none;
      width:100%;
      height:100%;
    }

    #left{
      width:220px;
      background:#111827;
      padding:10px;
    }

    #canvas{
      flex:1;
      background:#0b1220;
      position:relative;
    }

    #right{
      width:260px;
      background:#111827;
      padding:10px;
    }

    .item{
      background:#1f2937;
      padding:8px;
      margin:5px;
      cursor:grab;
      border-radius:6px;
    }

    .node{
      position:absolute;
      padding:10px;
      background:#1f2937;
      border-radius:6px;
      cursor:move;
      min-width:80px;
      text-align:center;
      font-size:12px;
    }

    .box{
      background:#1f2937;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <h2>OT Builder Login</h2>

  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

  <!-- LEFT -->
  <div id="left">
    <h3>Design Box</h3>

    <div class="item" draggable="true" ondragstart="drag('ERP')">ERP</div>
    <div class="item" draggable="true" ondragstart="drag('MES')">MES</div>
    <div class="item" draggable="true" ondragstart="drag('DB')">Database</div>
    <div class="item" draggable="true" ondragstart="drag('API')">API</div>
    <div class="item" draggable="true" ondragstart="drag('FIREWALL')">Firewall</div>

    <hr>

    <input id="sysName" placeholder="System name">
    <button onclick="createSystem()">Create System</button>

    <select id="systems" onchange="loadSystem(this.value)"></select>
  </div>

  <!-- CANVAS -->
  <div id="canvas"
       ondragover="allow(event)"
       ondrop="drop(event)">
  </div>

  <!-- RIGHT -->
  <div id="right">
    <h3>System Insight</h3>
    <button onclick="analyze()">Analyze</button>
    <div id="out"></div>
  </div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://sdskmilncpptrsuxowrb.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkc2ttaWxuY3BwdHJzdXhvd3JiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODExNDIsImV4cCI6MjA5NTI1NzE0Mn0.LGfmAnj_WTngOw_I7NsG9pmIit2hwOUW0IfvwY2WgUU"
);

let user = null;
let currentSystem = null;
let dragType = null;

/* ---------------- AUTH ---------------- */

async function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({ email, password });

  if(error) return alert(error.message);
  alert("Check email to confirm");
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email, password
  });

  if(error) return alert(error.message);

  user = data.user;

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "flex";

  loadSystems();
}

/* ---------------- SYSTEM ---------------- */

async function createSystem(){

  const name = document.getElementById("sysName").value;

  const { data, error } = await supabase
    .from("systems")
    .insert([{ name, user_id: user.id }])
    .select();

  if(error) return alert(error.message);

  currentSystem = data[0].id;

  loadSystems();
  loadNodes();
}

async function loadSystems(){

  const { data } = await supabase
    .from("systems")
    .select("*")
    .eq("user_id", user.id);

  const sel = document.getElementById("systems");
  sel.innerHTML = "";

  (data || []).forEach(s=>{
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.innerText = s.name;
    sel.appendChild(opt);
  });

  if(data.length){
    loadSystem(data[0].id);
  }
}

function loadSystem(id){
  currentSystem = id;
  loadNodes();
}

/* ---------------- DRAG DROP ---------------- */

function drag(type){
  dragType = type;
}

function allow(e){
  e.preventDefault();
}

async function drop(e){
  e.preventDefault();

  if(!dragType || !currentSystem) return;

  const node = {
    system_id: currentSystem,
    type: dragType,
    x: e.offsetX,
    y: e.offsetY
  };

  await supabase.from("nodes").insert([node]);

  renderNode(node);
}

/* ---------------- NODES ---------------- */

async function loadNodes(){

  document.querySelectorAll(".node").forEach(n=>n.remove());

  const { data } = await supabase
    .from("nodes")
    .select("*")
    .eq("system_id", currentSystem);

  (data || []).forEach(renderNode);
}

function renderNode(n){

  const div = document.createElement("div");
  div.className = "node";
  div.innerText = n.type;

  div.style.left = n.x + "px";
  div.style.top = n.y + "px";

  div.draggable = true;

  div.ondragend = async (e)=>{

    const x = e.pageX;
    const y = e.pageY;

    div.style.left = x + "px";
    div.style.top = y + "px";

    await supabase
      .from("nodes")
      .update({ x, y })
      .eq("id", n.id);
  };

  document.getElementById("canvas").appendChild(div);
}

/* ---------------- ANALYSIS ---------------- */

async function analyze(){

  const { data } = await supabase
    .from("nodes")
    .select("*")
    .eq("system_id", currentSystem);

  let count = {};

  (data || []).forEach(n=>{
    count[n.type] = (count[n.type] || 0) + 1;
  });

  document.getElementById("out").innerHTML =
    Object.entries(count)
    .map(([k,v])=>`<p>${k}: ${v}</p>`)
    .join("");
}

</script>

</body>
</html>
