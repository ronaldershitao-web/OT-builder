<!DOCTYPE html>
<html>
<head>
  <title>Smart School Workflow Designer</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      display:flex;
      height:100vh;
      background:#0f172a;
      color:white;
    }

    #left{
      width:280px;
      background:#111827;
      padding:10px;
      overflow:auto;
    }

    #center{
      flex:1;
      padding:10px;
      background:#0b1220;
      overflow:auto;
    }

    #right{
      width:280px;
      background:#111827;
      padding:10px;
    }

    textarea, select{
      width:100%;
      padding:8px;
      margin:5px 0;
      background:#1f2937;
      color:white;
      border:none;
      border-radius:6px;
    }

    button{
      padding:8px;
      margin-top:6px;
      width:100%;
      cursor:pointer;
    }

    .box{
      background:#1f2937;
      padding:8px;
      margin:5px 0;
      border-radius:6px;
      font-size:12px;
    }

    .good{color:#22c55e;}
    .warn{color:#f59e0b;}
    .bad{color:#ef4444;}
  </style>
</head>

<body>

<!-- LEFT: WORKFLOW SELECT -->
<div id="left">
  <h3>🎓 Smart School Designer</h3>

  <label>Choose Workflow</label>
  <select id="workflow">
    <option value="attendance">Attendance System</option>
    <option value="fees">Fee Payment System</option>
    <option value="register">Course Registration</option>
    <option value="announcement">Announcement System</option>
  </select>

  <button onclick="loadScenario()">Load Scenario</button>

  <hr>

  <h4>🧠 Step 1: Write Flow</h4>
  <textarea id="flow" rows="8" placeholder="Write step-by-step what happens..."></textarea>

  <h4>🏗️ Step 2: System Components</h4>
  <textarea id="arch" rows="8" placeholder="List systems (API, DB, Service, etc.)"></textarea>

  <h4>⚠️ Step 3: Failure Cases</h4>
  <textarea id="fail" rows="6" placeholder="What can go wrong?"></textarea>

  <button onclick="analyze()">Analyze Design</button>
</div>

<!-- CENTER: GUIDANCE -->
<div id="center">
  <h2>📘 Scenario</h2>
  <div id="scenario" class="box">Select a workflow to begin</div>

  <h2>🔄 Expected Flow Hint</h2>
  <div id="hint" class="box">---</div>
</div>

<!-- RIGHT: FEEDBACK -->
<div id="right">
  <h3>📊 Feedback</h3>
  <div id="out"></div>
</div>

<script>

const scenarios = {
  attendance: {
    text: "A student enters class and attendance is recorded automatically via QR scan.",
    hint: "Student → Scan QR → Verify identity → Record attendance → Update teacher dashboard"
  },
  fees: {
    text: "A student pays school fees online and receives instant receipt.",
    hint: "Payment initiated → Validate → Process transaction → Update ledger → Send receipt"
  },
  register: {
    text: "A student enrolls into a course during registration period.",
    hint: "Login → Select course → Check availability → Check prerequisites → Enroll → Confirm"
  },
  announcement: {
    text: "School sends announcement to all students instantly.",
    hint: "Admin creates message → Approve → Push notification → Deliver to app/SMS/email"
  }
};

function loadScenario(){
  let w = document.getElementById("workflow").value;
  document.getElementById("scenario").innerText = scenarios[w].text;
  document.getElementById("hint").innerText = scenarios[w].hint;
}

function analyze(){

  let flow = document.getElementById("flow").value.toLowerCase();
  let arch = document.getElementById("arch").value.toLowerCase();
  let fail = document.getElementById("fail").value.toLowerCase();

  let score = 0;
  let out = "";

  // FLOW CHECK
  if(flow.length > 50){
    score++;
    out += "<p class='good'>✔ Flow described</p>";
  } else {
    out += "<p class='bad'>✖ Flow too short</p>";
  }

  // ARCH CHECK
  let keywords = ["api", "database", "service", "auth"];
  let archScore = keywords.filter(k => arch.includes(k)).length;

  if(archScore >= 2){
    score++;
    out += "<p class='good'>✔ Architecture components identified</p>";
  } else {
    out += "<p class='warn'>⚠ Weak architecture mapping</p>";
  }

  // FAILURE CHECK
  if(fail.length > 30){
    score++;
    out += "<p class='good'>✔ Failure cases considered</p>";
  } else {
    out += "<p class='warn'>⚠ Missing failure thinking</p>";
  }

  // FINAL SCORE
  out += "<hr>";

  if(score === 3){
    out += "<p class='good'>🏆 Strong System Design Thinking</p>";
  } else if(score === 2){
    out += "<p class='warn'>👍 Good but incomplete</p>";
  } else {
    out += "<p class='bad'>⚠ Needs improvement</p>";
  }

  document.getElementById("out").innerHTML = out;
}

</script>

</body>
</html>
