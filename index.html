<!DOCTYPE html>
<html>
<head>
  <title>OT Builder Platform</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
    input, select, button { padding:10px; margin:5px; }
    .box { background:#111827; padding:15px; margin-top:10px; border-radius:10px; }
    .hidden { display:none; }
  </style>
</head>

<body>

<h1>🧠 OT Builder (Guided Academia System)</h1>

<!-- LOGIN (UNCHANGED) -->
<div id="authBox" class="box">
  <h3>Login / Sign Up</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="box">
    <h3>🏫 Guided OT System Builder (Academia Template)</h3>
    <p id="stepLabel">Step 1 of 3</p>
  </div>

  <!-- STEP 1 -->
  <div id="step1" class="box">
    <h3>1. Create Your Academia System</h3>
    <input id="systemName" placeholder="e.g. University Operations System">
    <button onclick="nextStep1()">Create System → Next</button>
  </div>

  <!-- STEP 2 -->
  <div id="step2" class="box hidden">
    <h3>2. Build Your System (ERP / MES / RULE)</h3>

    <input id="compName" placeholder="Component Name">

    <select id="compType">
      <option value="ERP">ERP (Data Layer)</option>
      <option value="MES">MES (Process Layer)</option>
      <option value="RULE">RULE (Decision Layer)</option>
    </select>

    <button onclick="addComponent()">Add Component</button>
    <button onclick="nextStep2()">Next</button>

    <div class="box">
      <h4>📦 System Preview</h4>
      <div id="components"></div>
    </div>
  </div>

  <!-- STEP 3 -->
  <div id="step3" class="box hidden">
    <h3>3. Run Simulation</h3>

    <button onclick="runSimulation()">▶ Run OT Flow</button>

    <div id="output"></div>
  </div>

  <!-- SYSTEM LIST -->
  <div class="box">
    <h3>Your Systems</h3>
    <div id="systemList"></div>
  </div>

</div>

<script>
const supabaseUrl = "https://sdskmilncpptrsuxowrb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkc2ttaWxuY3BwdHJzdXhvd3JiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODExNDIsImV4cCI6MjA5NTI1NzE0Mn0.LGfmAnj_WTngOw_I7NsG9pmIit2hwOUW0IfvwY2WgUU";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let user = null;
let currentSystem = null;
let step = 1;

// -------------------- AUTH (UNCHANGED) --------------------
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signUp({ email, password });

  if (error) return alert(error.message);

  alert("Sign up successful!");
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) return alert(error.message);

  user = data.user;

  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  loadSystems();
}

// -------------------- STEP FLOW --------------------
async function nextStep1(){
  const name = document.getElementById("systemName").value;

  if(!name){
    alert("Enter system name");
    return;
  }

  const { data, error } = await client
    .from("systems")
    .insert([{
      name: name,
      template: "ACADEMIA",
      user_id: user.id
    }])
    .select();

  if(error) return alert(error.message);

  currentSystem = data[0].id;

  // auto-seed guided components (IMPORTANT)
  await client.from("components").insert([
    { system_id: currentSystem, type: "ERP", name: "Students" },
    { system_id: currentSystem, type: "ERP", name: "Courses" },
    { system_id: currentSystem, type: "MES", name: "Enrollment Flow" },
    { system_id: currentSystem, type: "RULE", name: "Priority Registration" }
  ]);

  step = 2;
  updateSteps();
  loadComponents();
  loadSystems();
}

function nextStep2(){
  step = 3;
  updateSteps();
}

function updateSteps(){
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.add("hidden");

  document.getElementById("step" + step).classList.remove("hidden");

  document.getElementById("stepLabel").innerText =
    "Step " + step + " of 3";
}

// -------------------- COMPONENTS --------------------
async function addComponent(){
  const name = document.getElementById("compName").value;
  const type = document.getElementById("compType").value;

  if(!name || !currentSystem) return;

  await client.from("components").insert([{
    system_id: currentSystem,
    name,
    type
  }]);

  loadComponents();
}

async function loadComponents(){
  if(!currentSystem) return;

  const { data } = await client
    .from("components")
    .select("*")
    .eq("system_id", currentSystem);

  if(!data) return;

  document.getElementById("components").innerHTML =
    data.map(c => `<div>${c.type}: ${c.name}</div>`).join("");
}

// -------------------- SYSTEM LIST --------------------
async function loadSystems(){
  const { data } = await client
    .from("systems")
    .select("*")
    .eq("user_id", user.id);

  document.getElementById("systemList").innerHTML =
    (data || []).map(s =>
      `<div class="box" onclick="openSystem('${s.id}')">
        🏫 ${s.name}
      </div>`
    ).join("");
}

function openSystem(id){
  currentSystem = id;
  loadComponents();
}

// -------------------- SIMULATION --------------------
async function runSimulation(){

  const { data } = await client
    .from("components")
    .select("*")
    .eq("system_id", currentSystem);

  let erp = data.filter(x => x.type === "ERP").length;
  let mes = data.filter(x => x.type === "MES").length;
  let rule = data.filter(x => x.type === "RULE").length;

  let load = mes === 0 ? erp : erp / mes;

  document.getElementById("output").innerHTML = `
    <p>ERP Nodes: ${erp}</p>
    <p>MES Nodes: ${mes}</p>
    <p>RULE Nodes: ${rule}</p>
    <p><b>System Load:</b> ${load.toFixed(2)}</p>

    <p style="color:${load > 3 ? 'red' : 'lightgreen'}">
      ${load > 3 ? '⚠ Bottleneck Detected' : '✔ System Stable'}
    </p>
  `;
}
</script>

</body>
</html>
