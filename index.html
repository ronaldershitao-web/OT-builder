<!DOCTYPE html>
<html>
<head>
  <title>System Design Learning Lab</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      display:flex;
      height:100vh;
      background:#0f172a;
      color:white;
    }

    #left{
      width:260px;
      background:#111827;
      padding:10px;
      overflow:auto;
    }

    #canvas{
      flex:1;
      position:relative;
      background:#0b1220;
      overflow:hidden;
    }

    #right{
      width:260px;
      background:#111827;
      padding:10px;
    }

    .item{
      padding:6px;
      margin:5px;
      background:#1f2937;
      border-radius:6px;
      cursor:grab;
      font-size:12px;
    }

    .node{
      position:absolute;
      padding:8px;
      border-radius:6px;
      cursor:pointer;
      font-size:11px;
      min-width:90px;
      text-align:center;
      user-select:none;
    }

    .api { background:#2563eb; }
    .data { background:#16a34a; }
    .infra { background:#f59e0b; }
    .security { background:#ef4444; }
    .compute { background:#8b5cf6; }

    svg{
      position:absolute;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .selected{
      outline:2px solid white;
    }

    button{
      padding:6px;
      margin-top:5px;
    }
  </style>
</head>

<body>

<!-- LEFT TOOLBOX -->
<div id="left">
  <h3>System Design Tools</h3>

  <h4>API / Integration</h4>
  <div class="item" onclick="add('API_GATEWAY','api')">API Gateway</div>
  <div class="item" onclick="add('REST_API','api')">REST API</div>
  <div class="item" onclick="add('KAFKA','api')">Kafka Event Bus</div>
  <div class="item" onclick="add('WEBHOOK','api')">Webhook</div>

  <h4>Compute</h4>
  <div class="item" onclick="add('MICROSERVICE','compute')">Microservice</div>
  <div class="item" onclick="add('SERVERLESS','compute')">Serverless Function</div>
  <div class="item" onclick="add('BATCH','compute')">Batch Job</div>

  <h4>Data</h4>
  <div class="item" onclick="add('SQL_DB','data')">SQL Database</div>
  <div class="item" onclick="add('NOSQL','data')">NoSQL DB</div>
  <div class="item" onclick="add('REDIS','data')">Redis Cache</div>
  <div class="item" onclick="add('WAREHOUSE','data')">Data Warehouse</div>

  <h4>Infra</h4>
  <div class="item" onclick="add('LOAD_BALANCER','infra')">Load Balancer</div>
  <div class="item" onclick="add('CDN','infra')">CDN</div>
  <div class="item" onclick="add('VPC','infra')">VPC</div>

  <h4>Security</h4>
  <div class="item" onclick="add('AUTH','security')">Auth Service</div>
  <div class="item" onclick="add('WAF','security')">WAF</div>
  <div class="item" onclick="add('FIREWALL','security')">Firewall</div>

</div>

<!-- CANVAS -->
<div id="canvas" onclick="clearSelection()">
  <svg id="lines"></svg>
</div>

<!-- RIGHT PANEL -->
<div id="right">
  <h3>Controls</h3>

  <button onclick="runAnalysis()">Run Analysis</button>
  <div id="out"></div>
</div>

<script>
let nodes = [];
let edges = [];
let selected = null;

function add(type, cls){

  const node = {
    id: Date.now(),
    type,
    cls,
    x: 100 + Math.random()*300,
    y: 100 + Math.random()*300
  };

  nodes.push(node);
  render();
}

function render(){

  const canvas = document.getElementById("canvas");

  document.querySelectorAll(".node").forEach(n=>n.remove());
  drawLines();

  nodes.forEach(n=>{
    const div = document.createElement("div");
    div.className = "node " + n.cls;
    div.style.left = n.x + "px";
    div.style.top = n.y + "px";
    div.innerText = n.type;

    div.onclick = (e)=>{
      e.stopPropagation();
      selectNode(n);
    };

    div.onmousedown = (e)=>{
      dragNode(e,n);
    };

    canvas.appendChild(div);
  });
}

function selectNode(n){

  if(!selected){
    selected = n;
    return;
  }

  if(selected.id !== n.id){
    edges.push({from:selected.id,to:n.id});
  }

  selected = null;
  render();
}

function clearSelection(){
  selected = null;
}

function dragNode(e,node){

  let offsetX = e.clientX - node.x;
  let offsetY = e.clientY - node.y;

  function move(ev){
    node.x = ev.clientX - offsetX;
    node.y = ev.clientY - offsetY;
    render();
  }

  function up(){
    document.removeEventListener("mousemove",move);
    document.removeEventListener("mouseup",up);
  }

  document.addEventListener("mousemove",move);
  document.addEventListener("mouseup",up);
}

function drawLines(){

  const svg = document.getElementById("lines");
  svg.innerHTML = "";

  edges.forEach(e=>{

    const a = nodes.find(n=>n.id===e.from);
    const b = nodes.find(n=>n.id===e.to);

    if(!a||!b) return;

    const line = document.createElementNS("http://www.w3.org/2000/svg","line");

    line.setAttribute("x1", a.x+50);
    line.setAttribute("y1", a.y+20);
    line.setAttribute("x2", b.x+50);
    line.setAttribute("y2", b.y+20);
    line.setAttribute("stroke","white");

    svg.appendChild(line);
  });
}

function runAnalysis(){

  let count = {};
  let missing = [];

  nodes.forEach(n=>{
    count[n.type] = (count[n.type]||0)+1;
  });

  let hasDB = nodes.some(n=>n.cls==="data");
  let hasAPI = nodes.some(n=>n.cls==="api");
  let hasSecurity = nodes.some(n=>n.cls==="security");
  let hasInfra = nodes.some(n=>n.cls==="infra");

  if(!hasAPI) missing.push("No API layer detected");
  if(!hasDB) missing.push("No database found");
  if(!hasSecurity) missing.push("No security layer (Auth/WAF)");
  if(!hasInfra) missing.push("No infrastructure layer (LB/CDN)");

  let html = "<h4>System Summary</h4>";

  html += Object.entries(count)
    .map(([k,v])=>`<p>${k}: ${v}</p>`)
    .join("");

  html += "<h4>Insights</h4>";

  if(missing.length===0){
    html += "<p>✔ Good architecture coverage</p>";
  } else {
    missing.forEach(m=>{
      html += "<p>⚠ "+m+"</p>";
    });
  }

  document.getElementById("out").innerHTML = html;
}

</script>

</body>
</html>
