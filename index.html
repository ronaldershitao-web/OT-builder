<!DOCTYPE html>
<html>
<head>
  <title>OT Builder - Canvas Architecture</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      padding:20px;
    }

    .box {
      background:#111827;
      padding:15px;
      border-radius:10px;
      margin:10px;
    }

    .hidden { display:none; }

    .layout {
      display:flex;
      gap:10px;
    }

    #canvas {
      width:60%;
      height:600px;
      background:#0b1220;
      position:relative;
      border:1px solid #1f2937;
    }

    .node {
      position:absolute;
      padding:10px;
      background:#1f2937;
      border-radius:8px;
      cursor:move;
      min-width:100px;
      text-align:center;
    }

    .palette-item {
      padding:8px;
      margin:5px;
      background:#1f2937;
      border-radius:6px;
      cursor:grab;
    }
  </style>
</head>

<body>

<h1>🧠 OT Builder (Canvas Architecture Designer)</h1>

<!-- AUTH -->
<div id="authBox" class="box">
  <h3>Login / Sign Up</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="box">
    <h3>🏫 OT Architecture Canvas</h3>
  </div>

  <div class="layout">

    <!-- PALETTE -->
    <div class="box" style="width:20%;">
      <h3>🧩 Design Box</h3>

      <div class="palette-item" draggable="true" ondragstart="dragStart(event,'ERP')">📦 ERP</div>
      <div class="palette-item" draggable="true" ondragstart="dragStart(event,'MES')">⚙ MES</div>
      <div class="palette-item" draggable="true" ondragstart="dragStart(event,'RULE')">📜 RULE</div>
      <div class="palette-item" draggable="true" ondragstart="dragStart(event,'DB')">🗄 Database</div>
      <div class="palette-item" draggable="true" ondragstart="dragStart(event,'LB')">⚖ Load Balancer</div>
      <div class="palette-item" draggable="true" ondragstart="dragStart(event,'MULE')">🔗 MuleSoft</div>
      <div class="palette-item" draggable="true" ondragstart="dragStart(event,'SAP')">📘 SAP Module</div>

    </div>

    <!-- CANVAS -->
    <div id="canvas"
         ondragover="allowDrop(event)"
         ondrop="drop(event)">
    </div>

    <!-- INFO -->
    <div class="box" style="width:20%;">
      <h3>📊 System View</h3>
      <button onclick="runSimulation()">Run Simulation</button>
      <div id="output"></div>
    </div>

  </div>

</div>

<script>
const supabaseUrl = "https://sdskmilncpptrsuxowrb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkc2ttaWxuY3BwdHJzdXhvd3JiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODExNDIsImV4cCI6MjA5NTI1NzE0Mn0.LGfmAnj_WTngOw_I7NsG9pmIit2hwOUW0IfvwY2WgUU";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let user = null;
let currentSystem = null;
let dragType = null;

/* ---------------- AUTH ---------------- */

async function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signUp({ email, password });
  if(error) return alert(error.message);

  alert("Signed up!");
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await client.auth.signInWithPassword({
    email, password
  });

  if(error) return alert(error.message);

  user = data.user;

  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

/* ---------------- DRAG SYSTEM ---------------- */

function dragStart(e, type){
  dragType = type;
}

function allowDrop(e){
  e.preventDefault();
}

async function drop(e){
  e.preventDefault();

  if(!dragType) return;

  const canvas = document.getElementById("canvas");

  const node = document.createElement("div");
  node.className = "node";
  node.innerText = dragType;

  node.style.left = e.offsetX + "px";
  node.style.top = e.offsetY + "px";

  node.draggable = true;

  node.ondragend = function(ev){
    node.style.left = ev.pageX - canvas.offsetLeft + "px";
    node.style.top = ev.pageY - canvas.offsetTop + "px";
  };

  canvas.appendChild(node);

  /* SAVE TO SUPABASE */
  if(currentSystem){
    await client.from("nodes").insert([{
      system_id: currentSystem,
      name: dragType,
      layer: dragType
    }]);
  }

  dragType = null;
}

/* ---------------- SIMULATION ---------------- */

async function runSimulation(){

  const { data } = await client
    .from("nodes")
    .select("*")
    .eq("system_id", currentSystem);

  if(!data) return;

  let erp = data.filter(n => n.layer === "ERP").length;
  let mes = data.filter(n => n.layer === "MES").length;
  let rule = data.filter(n => n.layer === "RULE").length;
  let db = data.filter(n => n.layer === "DB").length;

  let load = mes === 0 ? erp : erp / mes;

  document.getElementById("output").innerHTML = `
    <p>ERP: ${erp}</p>
    <p>MES: ${mes}</p>
    <p>RULE: ${rule}</p>
    <p>DB: ${db}</p>

    <p><b>Load Index:</b> ${load.toFixed(2)}</p>

    <p style="color:${load > 3 ? 'red' : 'lightgreen'}">
      ${load > 3 ? '⚠ Bottleneck Detected' : '✔ System Stable'}
    </p>
  `;
}
</script>

</body>
</html>
